services:
  # Single service: scans run inside the API process so their progress always
  # streams over the WebSocket (live events are never lost to a separate
  # process). The API also runs the in-process maintenance loop (scheduled
  # watchlist re-scans, orphan recovery, digests, file-cache sweep) on startup.
  # Run a single replica — the loop is not designed for multi-process claiming.
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akira
      POSTGRES_PASSWORD: akira
      POSTGRES_DB: akira
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
