<!DOCTYPE html>
<html lang="en" data-theme="carbon" data-mode="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>
  (function () {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'js/app.jsx', false);
      xhr.send(null);
      if (xhr.status === 200) {
        var text = xhr.responseText;
        var modeMatch = text.match(/"mode"\s*:\s*"([^"]+)"/);
        var themeMatch = text.match(/"theme"\s*:\s*"([^"]+)"/);
        var mode = modeMatch ? modeMatch[1] : "dark";
        var theme = themeMatch ? themeMatch[1] : "carbon";
        document.documentElement.setAttribute('data-mode', mode);
        document.documentElement.setAttribute('data-theme', mode === 'light' ? 'warm' : theme);
      }
    } catch (e) {
      console.warn("Could not sync theme config on boot", e);
    }
  })();
</script>
<title>Akira AI</title>
<!-- Backend API base. Override at runtime with ?api=http://host:port/api/v1 -->
<meta name="akira-api" content="http://localhost:8000/api/v1" />
<link rel="icon" type="image/svg+xml" sizes="32x32 128x128 180x180 192x192 256x256" href="logo-collapsed.svg?v=2" />

    <path d="M43 50l5 5 9-9" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />

</template>
<style>
  #__boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-app, #0e0f12); z-index: 9999; transition: opacity 0.4s ease; }
  #__boot.gone { opacity: 0; pointer-events: none; }
  #__boot .boot-logo { height: 54px; width: auto; object-fit: contain; animation: bootPulse 1.3s ease-in-out infinite; }
  @keyframes bootPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  html[data-mode="dark"] #__boot .light-only { display: none; }
  html[data-mode="light"] #__boot .dark-only { display: none; }
</style>
</head>
<body>
<div id="__boot">
  <img src="logo.svg" class="boot-logo dark-only" alt="Akira AI" />
  <img src="lightmode-logo.svg" class="boot-logo light-only" alt="Akira AI" />
</div>
<div id="root"></div>

<script>
  // If CSS animations can't advance (throttled/headless contexts), reveal content instantly.
  (function () {
    var fired = false;
    requestAnimationFrame(function () { fired = true; });
    setTimeout(function () { if (!fired) document.documentElement.setAttribute("data-no-anim", "1"); }, 600);
  })();
</script>

<script type="text/babel" data-presets="react">
  function __boot() {
    if (!window.VaultApp) { setTimeout(__boot, 40); return; }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(window.VaultApp));
    setTimeout(() => { const b = document.getElementById("__boot"); if (b) { b.classList.add("gone"); setTimeout(() => b.remove(), 450); } }, 60);
  }
  __boot();
</script>
